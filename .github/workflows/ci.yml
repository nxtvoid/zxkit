name: CI

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fetch base branch
        run: git fetch origin "${{ github.base_ref }}" --depth=1

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3

      - name: Install dependencies
        run: bun ci

      - name: Detect publishable package changes
        id: changeset-check
        run: node .github/scripts/needs-changeset.mjs
        env:
          BASE_REF: ${{ github.base_ref }}

      - name: Check changesets
        if: steps.changeset-check.outputs.needs_changeset == 'true'
        run: bunx changeset status --since=origin/${{ github.base_ref }}

      - name: Check types
        run: bun run check

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build
